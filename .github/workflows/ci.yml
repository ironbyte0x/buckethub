name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  BUN_VERSION: 1.3.11
  NODE_VERSION: 24

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: bun ci

  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - run: bun nx run-many -t typecheck

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - run: bun nx run-many -t lint

  format:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - run: bunx oxfmt --check .

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls | grep @playwright/test | sed 's/.*@//')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun playwright install chromium

      - name: Install Playwright OS dependencies
        run: bun playwright install-deps chromium

      - run: bun nx run-many -t test

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - run: bun nx run-many -t build

  e2e:
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format, test, build]
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun pm ls | grep @playwright/test | sed 's/.*@//')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: bun playwright install chromium

      - name: Install Playwright OS dependencies
        run: bun playwright install-deps chromium

      - run: bun nx e2e console-e2e
        env:
          E2E_MODE: docker

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: dist/.playwright/apps/console-e2e/playwright-report
          retention-days: 14
